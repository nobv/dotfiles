name: agent-config
version: 0.0.1
description: Declarative APM configuration for Claude Code skills, plugins, and MCP servers
author: nobv
# Which agent platforms to deploy to:
targets:
  - claude

dependencies:
  apm:
    - anthropics/skills
    - currents-dev/playwright-best-practices-skill
    - shadcn-ui/ui/skills/shadcn
    - vercel-labs/agent-skills/skills/react-best-practices
    - vercel-labs/next-skills/skills/next-best-practices
    # difit diff-viewer review skills (upstream source; replaces local vendoring)
    - yoshiko-pg/difit/skills/difit
    - yoshiko-pg/difit/skills/difit-review
    # cmux CLI control skills (drive workspaces, browser surface, socket API)
    - manaflow-ai/cmux/skills/cmux
    - manaflow-ai/cmux/skills/cmux-workspace
    - manaflow-ai/cmux/skills/cmux-browser
    - manaflow-ai/cmux/skills/cmux-socket-policy
    - manaflow-ai/cmux/skills/cmux-keyboard-shortcuts
    - manaflow-ai/cmux/skills/cmux-settings
    - manaflow-ai/cmux/skills/cmux-customization
    - manaflow-ai/cmux/skills/cmux-markdown
    - manaflow-ai/cmux/skills/cmux-diagnostics
  mcp:
    - name: io.github.github/github-mcp-server
      transport: http
    - name: doist/todoist-ai
      transport: http
includes: auto
scripts: {}
